# neb-helper tsguess teaching config
#
# This workflow generates TS/DIMER guesses directly from IS/FS endpoints.
# It is useful when direct Cartesian interpolation gives bad bonds, or when
# a strong metal/acid-site anchor pulls a DIMER search back to the initial state.
#
# Run:
#   neb-helper tsguess examples\tsguess\sc_dmf_c2h4.yaml
#
# The Sc/DMF/C2H4 files included in this directory are a template case.
# For your own system, replace initial/final, active_atoms, reaction coordinates,
# candidate fractions, and selection thresholds.
#
# This is a TS initial-guess generator, not a TS optimizer. Always inspect the
# recommended structure, dimer_vector.inc, and direction-check xyz before running CP2K.

workflow: tsguess

# Endpoint structures. They must have the same atom count, element order, cell,
# and PBC. Atom correspondence is assumed.
initial: Sc_DMF_C2H4_IS-1.cif
final: Sc_DMF_C2H4_FS-1.cif

# Atom numbering convention for active_atoms and reaction coordinate pairs.
# true: use 1-based labels from visualization tools.
# false: use Python/ASE 0-based indices.
atom_indices_1_based: true

# Local reaction region. Non-active atoms are taken from path.base by default.
active_atoms: "577-598"

path:
  # active_idpp moves only active_atoms and cleans their internal distances with
  # a lightweight IDPP-like objective. active_linear is a simpler fallback.
  method: active_idpp

  # Structure used for non-active atoms: initial or final.
  base: initial

  # Candidate reaction-progress fractions from IS to FS.
  # Diels-Alder-like TS guesses often sit on the product side, but this is
  # chemistry-dependent and should be adjusted.
  fractions: [0.70, 0.75, 0.78, 0.80]

  idpp:
    # Lightweight optimizer steps for active-region distance cleanup.
    steps: 200

    # Maximum coordinate update per IDPP step.
    max_step: 0.03

    # Tether to the original active-region interpolation; larger values keep the
    # structure closer to the linear path.
    tether_weight: 0.02

reaction_coordinates:
  # Bonds expected to form. Distances are reported in metrics.csv.
  forming_bonds:
    - [578, 594]
    - [581, 593]

  # Bonds/anchors expected to weaken.
  weakening_bonds:
    - [577, 582]

  # Extra distances reported but not directly used as strong scoring terms.
  monitor_bonds:
    - [593, 594]

selection:
  # Weak preference used when several candidates have similar geometric scores.
  prefer_fraction: 0.75

  # Desired distance range for each forming bond in Angstrom.
  forming_range: [2.10, 2.45]

  # Minimum desired distance for weakening bonds.
  weakening_min: 3.0

  # Clash guard inside the active region.
  min_pair_distance: 0.65

candidate_outputs:
  # Output directory for candidates, metrics, notes, and optional DIMER files.
  directory: tsguess_outputs

  # ASE write format for candidate structures.
  format: cif

  # true writes every candidate; false writes only the recommended one.
  write_all: true

  # Recommended structure filename. {tag} becomes t0p750, etc.
  recommended_name: "ts_guess_recommended_{tag}.cif"

  # Candidate table with distances, scores, and recommendation flag.
  metrics: metrics.csv

  # Human-readable summary.
  notes: notes.md

dimer_vector:
  # Write CP2K &DIMER_VECTOR.
  enabled: true

  # local_tangent uses candidate(tangent_fractions[1]) - candidate(tangent_fractions[0]).
  source: local_tangent
  tangent_fractions: [0.70, 0.78]

  # Which atom components are retained in DIMER_VECTOR.
  atoms: active

  # Remove active-region center-of-mass translation from the vector.
  remove_translation: active

  # Normalize and optionally scale the final vector.
  normalize: true
  scale: 1.0

  # Output CP2K include snippet.
  file: dimer_vector.inc

check:
  # Write a three-frame xyz: center - vector, center, center + vector.
  # Inspect this file before trusting the DIMER direction.
  enabled: true

  # Displacement amplitude in Angstrom for direction visualization.
  amplitude: 1.0
  file: dimer_direction_check_minus_center_plus.xyz
