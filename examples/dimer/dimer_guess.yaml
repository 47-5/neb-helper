# neb-helper dimer teaching config
#
# This workflow creates one or more TS/DIMER initial structures from an
# existing NEB image pair, and writes a CP2K &DIMER_VECTOR block.
#
# Run:
#   neb-helper dimer examples\dimer\dimer_guess.yaml
#
# Equivalent command-line shape:
#   neb-helper dimer --source ./neb_path --between 1 2 --fraction 0.5 `
#     --active-atoms "577-598" --atoms active --atom-indices-1-based
#
# This is not a full CP2K input. Copy dimer_vector.inc into:
#   &MOTION / &GEO_OPT / &TRANSITION_STATE / &DIMER

# Directory containing image_000.xyz, image_001.xyz, ...
source: ./neb_path

# Image pair defining the direction. These are 0-based positions in the sorted
# matched image file list, not atom indices.
# With prefix=image_ and suffix=.xyz, [1, 2] usually reads image_001.xyz and
# image_002.xyz when image_000.xyz exists.
# With CP2K files such as TS9-pos-Replica_nr_1-1.xyz and TS9-pos-Replica_nr_2-1.xyz,
# use [0, 1] if those are the first two matched files. The CLI prints the actual files used.
between: [1, 2]

# Interpolation fraction from left image to right image used for the TS guess.
# You may also use fractions: [0.25, 0.50, 0.75] to create several guesses.
fraction: 0.5

# Atom selection convention for active_atoms/frozen_atoms/atoms lists.
# true: use 1-based labels from visualization programs such as GaussView.
# false: use Python/ASE 0-based indices.
atom_indices_1_based: true

# Reaction-center atoms. Used when atoms: active.
active_atoms: "577-598"

# Which atom components are kept in the DIMER_VECTOR:
#   active   keep active_atoms only
#   all      keep every atom
#   "10,12" or [10, 12]  keep an explicit selection
atoms: active

# Input image naming pattern: {prefix}{index:03d}{suffix}. Include "_" in prefix if needed.
prefix: image_
suffix: .xyz

# Flexible matching:
#   prefix: null   match any prefix, for example TS9-pos-Replica_nr_1-1.xyz
#   suffix: null   match any suffix after the image index

# Output directory for ts_guess.xyz and dimer_vector.inc.
output_dir: ./dimer_guess_001_002

# ASE write format for the TS guess structure.
format: xyz

# Normalize the vector after atom selection. CP2K DIMER mainly needs direction.
normalize: true

# Scale applied after optional normalization.
scale: 1.0
